<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sem conexão</title>
    <meta name="theme-color" content="#111827" />
    <style>
      body { margin: 0; background: #111827; color: #e5e7eb; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .card { max-width: 560px; width: 100%; background: #1f2937; border: 1px solid #374151; border-radius: 16px; padding: 24px; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
      .title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #fff; }
      .desc { font-size: 14px; color: #d1d5db; }
      .actions { margin-top: 16px; display: flex; gap: 12px; }
      .btn { padding: 10px 16px; border-radius: 10px; border: 1px solid #ef4444; background: #ef4444; color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; }
      .btn-outline { border-color: #4b5563; background: #374151; color: #e5e7eb; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="title">Sem conexão</div>
        <div class="desc">Parece que você está sem internet. Verifique sua rede e tente novamente.</div>
        <div class="actions">
          <button class="btn" onclick="location.reload()">Tentar novamente</button>
          <button class="btn btn-outline" onclick="location.href='/'">Ir para início</button>
        </div>
      </div>
    </div>
  </body>
  </html>
